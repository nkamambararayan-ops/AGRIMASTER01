<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Créer un compte — AgriMaster</title>
<meta name="description" content="Créez votre compte AgriMaster gratuitement et accédez à des formations agricoles professionnelles.">
<link rel="icon" type="image/png" href="images/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="bg-blob blob-1"></div>
<div class="bg-blob blob-2"></div>

<main class="auth-wrapper">
  <div class="auth-card glass">
    <div class="auth-logo">
      <img src="images/logo.png" alt="Logo AgriMaster">
      <div class="logo-text" style="font-size:1.3rem;">Agri<span style="color:var(--orange-500)">Master</span></div>
    </div>
    <h1 class="auth-title">Créer un compte</h1>
    <p class="auth-subtitle">Rejoignez la communauté AgriMaster dès aujourd'hui.</p>

    <div class="form-error" id="formError"></div>
    <div class="form-success" id="formSuccess"></div>

    <form id="registerForm">
      <div class="form-group">
        <label class="form-label">Nom complet</label>
        <div class="input-icon-wrap">
          <i class="fa-solid fa-user"></i>
          <input type="text" class="form-input" id="fullName" placeholder="Ex : Jean Ndongo" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Adresse email</label>
        <div class="input-icon-wrap">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" class="form-input" id="email" placeholder="vous@exemple.com" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Téléphone (Mobile Money)</label>
        <div class="input-icon-wrap">
          <i class="fa-solid fa-phone"></i>
          <input type="tel" class="form-input" id="phone" placeholder="6XX XXX XXX" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <div class="input-icon-wrap">
          <i class="fa-solid fa-lock"></i>
          <input type="password" class="form-input" id="password" placeholder="8 caractères minimum" minlength="6" required>
          <button type="button" class="input-toggle-eye" onclick="togglePwd('password', this)"><i class="fa-solid fa-eye"></i></button>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:22px;">
        <label class="form-check">
          <input type="checkbox" required> J'accepte les <a href="#" class="form-link">conditions d'utilisation</a>
        </label>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
        <i class="fa-solid fa-user-plus"></i> Créer mon compte
      </button>
    </form>

    <p class="auth-footer-text">Vous avez déjà un compte ? <a href="connexion.html" class="form-link">Se connecter</a></p>
  </div>
</main>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
function togglePwd(id, btn) {
  const input = document.getElementById(id);
  const isPwd = input.type === 'password';
  input.type = isPwd ? 'text' : 'password';
  btn.innerHTML = `<i class="fa-solid ${isPwd ? 'fa-eye-slash' : 'fa-eye'}"></i>`;
}

const form = document.getElementById('registerForm');
const errorBox = document.getElementById('formError');
const successBox = document.getElementById('formSuccess');
const submitBtn = document.getElementById('submitBtn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorBox.style.display = 'none';
  successBox.style.display = 'none';
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<span class="spinner"></span> Création en cours...';

  const full_name = document.getElementById('fullName').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const password = document.getElementById('password').value;

  try {
    const user = await registerUser({ full_name, email, phone, password });
    setSession(user);
    successBox.textContent = 'Compte créé avec succès ! Redirection...';
    successBox.style.display = 'block';
    setTimeout(() => window.location.href = 'tableau-de-bord.html', 1200);
  } catch (err) {
    errorBox.textContent = err.message || 'Une erreur est survenue.';
    errorBox.style.display = 'block';
    submitBtn.disabled = false;
    submitBtn.innerHTML = '<i class="fa-solid fa-user-plus"></i> Créer mon compte';
  }
});

if (getSession()) window.location.href = 'tableau-de-bord.html';
</script>
</body>
</html>
