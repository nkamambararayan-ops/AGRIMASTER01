<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Réinitialiser le mot de passe — AgriMaster</title>
<link rel="icon" type="image/png" href="images/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="bg-blob blob-1"></div>
<div class="bg-blob blob-2"></div>

<main class="auth-wrapper">
  <div class="auth-card glass">
    <div class="auth-logo">
      <img src="images/logo.png" alt="Logo AgriMaster">
      <div class="logo-text" style="font-size:1.3rem;">Agri<span style="color:var(--orange-500)">Master</span></div>
    </div>
    <h1 class="auth-title">Réinitialiser le mot de passe</h1>
    <p class="auth-subtitle">Saisissez le code reçu ainsi que votre nouveau mot de passe.</p>

    <div class="form-error" id="formError"></div>
    <div class="form-success" id="formSuccess"></div>

    <form id="resetForm">
      <div class="form-group">
        <label class="form-label">Adresse email</label>
        <div class="input-icon-wrap">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" class="form-input" id="email" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Code de réinitialisation</label>
        <div class="input-icon-wrap">
          <i class="fa-solid fa-key"></i>
          <input type="text" class="form-input" id="token" placeholder="Ex : A1B2C3D4" required style="text-transform:uppercase;">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Nouveau mot de passe</label>
        <div class="input-icon-wrap">
          <i class="fa-solid fa-lock"></i>
          <input type="password" class="form-input" id="newPassword" minlength="6" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
        <i class="fa-solid fa-rotate"></i> Réinitialiser
      </button>
    </form>

    <p class="auth-footer-text"><a href="connexion.html" class="form-link"><i class="fa-solid fa-arrow-left"></i> Retour à la connexion</a></p>
  </div>
</main>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
if (params.get('email')) document.getElementById('email').value = params.get('email');

const form = document.getElementById('resetForm');
const errorBox = document.getElementById('formError');
const successBox = document.getElementById('formSuccess');
const submitBtn = document.getElementById('submitBtn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorBox.style.display = 'none';
  successBox.style.display = 'none';
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<span class="spinner"></span> Réinitialisation...';

  const email = document.getElementById('email').value.trim();
  const token = document.getElementById('token').value.trim();
  const newPassword = document.getElementById('newPassword').value;

  try {
    await resetPassword({ email, token, newPassword });
    successBox.textContent = 'Mot de passe réinitialisé avec succès ! Redirection...';
    successBox.style.display = 'block';
    setTimeout(() => window.location.href = 'connexion.html', 1500);
  } catch (err) {
    errorBox.textContent = err.message || 'Une erreur est survenue.';
    errorBox.style.display = 'block';
  } finally {
    submitBtn.disabled = false;
    submitBtn.innerHTML = '<i class="fa-solid fa-rotate"></i> Réinitialiser';
  }
});
</script>
</body>
</html>
