<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mot de passe oublié — AgriMaster</title>
<link rel="icon" type="image/png" href="images/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="bg-blob blob-1"></div>
<div class="bg-blob blob-2"></div>

<main class="auth-wrapper">
  <div class="auth-card glass">
    <div class="auth-logo">
      <img src="images/logo.png" alt="Logo AgriMaster">
      <div class="logo-text" style="font-size:1.3rem;">Agri<span style="color:var(--orange-500)">Master</span></div>
    </div>
    <h1 class="auth-title">Mot de passe oublié</h1>
    <p class="auth-subtitle">Entrez votre email, nous générerons un code de réinitialisation.</p>

    <div class="form-error" id="formError"></div>
    <div class="form-success" id="formSuccess"></div>

    <form id="forgotForm">
      <div class="form-group">
        <label class="form-label">Adresse email</label>
        <div class="input-icon-wrap">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" class="form-input" id="email" placeholder="vous@exemple.com" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
        <i class="fa-solid fa-paper-plane"></i> Générer le code
      </button>
    </form>

    <p class="auth-footer-text"><a href="connexion.html" class="form-link"><i class="fa-solid fa-arrow-left"></i> Retour à la connexion</a></p>
  </div>
</main>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
const form = document.getElementById('forgotForm');
const errorBox = document.getElementById('formError');
const successBox = document.getElementById('formSuccess');
const submitBtn = document.getElementById('submitBtn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorBox.style.display = 'none';
  successBox.style.display = 'none';
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<span class="spinner"></span> Génération...';

  const email = document.getElementById('email').value.trim();

  try {
    const token = await requestPasswordReset(email);
    successBox.innerHTML = `Code généré : <strong>${token}</strong><br><span style="font-size:0.8rem;">(En production, ce code serait envoyé par email/SMS. Ici, il est affiché pour la démo.)</span>`;
    successBox.style.display = 'block';
    setTimeout(() => window.location.href = `reinitialiser-mot-de-passe.html?email=${encodeURIComponent(email)}`, 2500);
  } catch (err) {
    errorBox.textContent = err.message || 'Une erreur est survenue.';
    errorBox.style.display = 'block';
  } finally {
    submitBtn.disabled = false;
    submitBtn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Générer le code';
  }
});
</script>
</body>
</html>
